service: dashboar-file-processor-lambda
frameworkVersion: '^3.0.0'

useDotenv: true

plugins:
  - serverless-webpack
  - serverless-localstack
  - serverless-offline-sqs
  - serverless-offline

configValidationMode: warn

package:
  individually: true

custom:
  serverless-offline-sqs:
    apiVersion: '2012-11-05'
    endpoint: 'http://127.0.0.1:4566'
    region: us-east-2
    accessKeyId: 'root'
    secretAccessKey: 'root'
  
  localstack:
    stages:
      - local
    host: http://localhost
    edgePort: 4566

  serverless-offline:
    httpPort: 6870
    lambdaPort: 3003
    noPrependStageInUrl: true

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-2
  stage: ${opt:stage, 'dev'}
  environment:
    ENVIRONMENT: ${env:ENVIRONMENT}
    HTTP_PORT: ${env:HTTP_PORT}
    AWS_REGION: ${env:AWS_REGION}
    DATABASE_TYPE: ${env:DATABASE_TYPE}
    DATABASE_HOST: ${env:DATABASE_HOST}
    DATABASE_PORT: ${env:DATABASE_PORT}
    DATABASE_NAME: ${env:DATABASE_NAME}
    DATABASE_USERNAME: ${env:DATABASE_USERNAME}
    DATABASE_PASSWORD: ${env:DATABASE_PASSWORD}
    TOKEN_JWT_SECRET: ${env:TOKEN_JWT_SECRET}
    TOKEN_JWT_EXPIRES: ${env:TOKEN_JWT_EXPIRES}
    REFRESH_TOKEN_JWT_SECRET: ${env:REFRESH_TOKEN_JWT_SECRET}
    REFRESH_TOKEN_JWT_EXPIRES: ${env:REFRESH_TOKEN_JWT_EXPIRES}
    AWS_SQS_TRANSFER_URL: ${env:AWS_SQS_TRANSFER_URL}
    AWS_S3_BUCKET_NAME: ${env:AWS_S3_BUCKET_NAME}
    BUCKET_NAME: ${env:BUCKET_NAME}
  
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:ListBucket
          Resource:
            - "arn:aws:s3:::development-dashboard-documents"
            - "arn:aws:s3:::development-dashboard-documents/*"
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource:
            - Fn::GetAtt: [DashboardTransferProcessingQueue, Arn]

functions:
  dashbooardFileProcessor:
    timeout: 30
    memorySize: 512
    handler: ./src/functions/dashboard-file-processor/handler.handler
    events:
      - http:
          method: get
          path: /dashboard-file-processor
      - s3:
          bucket: development-dashboard-documents
          event: s3:ObjectCreated:*
          existing: true
    environment:
      HTTP_TIMEOUT: ${env:HTTP_TIMEOUT}
      SES_SOURCE_ARN: ${env:SES_SOURCE_ARN}
      SES_EMAIL_FROM: ${env:SES_EMAIL_FROM}
      SES_2FA_TEMPLATE: ${env:SES_2FA_TEMPLATE}

  transferAssets:
    timeout: 30
    memorySize: 512
    handler: ./src/functions/dashboard-transfer-assets/handler.handler
    events:
      - http:
          method: post
          path: /transfer-assets
      - sqs:
          arn:
            Fn::GetAtt:
              - DashboardTransferProcessingQueue
              - Arn
          batchSize: 1
    environment:
      AWS_COGNITO_CLIENT_ID: ${env:AWS_COGNITO_CLIENT_ID}
      AWS_COGNITO_CLIENT_ID_SECRET: ${env:AWS_COGNITO_CLIENT_ID_SECRET}
      BLOCKCHAIN_API_URL: ${env:BLOCKCHAIN_API_URL}
      BLOCKCHAIN_API_KEY_HASH: ${env:BLOCKCHAIN_API_KEY_HASH}
      BDM_API_KEY: ${env:BDM_API_KEY}
      BASE_URL_BDM: ${env:BASE_URL_BDM}
      BDM_VERSION: ${env:BDM_VERSION}
      BDM_AUTH_USERNAME: ${env:BDM_AUTH_USERNAME}
      BDM_AUTH_PASSWORD: ${env:BDM_AUTH_PASSWORD}
      HTTP_TIMEOUT: ${env:HTTP_TIMEOUT}

resources:
  Resources:
    DashboardTransferProcessingQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${file(./src/common/serverless/sqs/index.js):build.DashboardTransferProcessingQueueFifo}
        FifoQueue: true